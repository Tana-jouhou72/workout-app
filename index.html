<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexFlow | Workout Tracker</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </span>
        <h1>FlexFlow</h1>
      </div>
      <nav class="app-nav">
        <button class="nav-btn active" id="nav-workout">Workout</button>
        <button class="nav-btn" id="nav-history">History</button>
      </nav>
      <div class="header-stats">
        <div class="stat-box">
          <span class="stat-value" id="stats-completed">0</span>
          <span class="stat-label">Sets Today</span>
        </div>
        <div class="stat-box streak-box">
          <span class="stat-value" id="stats-streak">0</span>
          <span class="stat-label">Day Streak</span>
        </div>
        <button class="btn btn-secondary" id="btn-reset-day">Reset Today</button>
      </div>
    </header>

    <!-- Weekly Timeline -->
    <section class="weekly-timeline" id="weekly-timeline">
      <div class="timeline-grid" id="timeline-grid">
        <!-- Days will be dynamically inserted here -->
      </div>
    </section>

    <!-- Main Workspace -->
    <main class="workout-workspace" id="workout-section">
      <!-- Active Day Panel -->
      <section class="day-details-panel">
        <div class="panel-header">
          <div class="title-group">
            <h2 id="active-day-name">Monday</h2>
            <p id="active-day-subtitle" class="text-subtitle">Chest, Shoulder & Tricep Day</p>
          </div>
          <button class="btn btn-primary btn-icon" id="btn-add-exercise">
            <span>+ Add Exercise</span>
          </button>
        </div>

        <!-- Muscle Volume Breakdown -->
        <div class="volume-bar" id="volume-breakdown">
          <!-- Badges dynamically inserted -->
        </div>

        <!-- Exercises List Container -->
        <div class="exercises-container" id="exercises-list">
          <!-- Dynamic exercise cards -->
        </div>

        <div class="day-actions" style="display: flex; gap: 10px; margin-top: 20px; justify-content: center;">
          <button class="btn btn-primary" id="btn-complete-day">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            <span>Complete Day</span>
          </button>
          <button class="btn btn-secondary" id="btn-undo-day">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            <span>Undo Day</span>
          </button>
        </div>
      </section>
    </main>

    <!-- History Workspace -->
    <main class="history-workspace hidden" id="history-section">
      <div class="history-header">
        <div class="title-group">
          <h2>Workout History</h2>
          <p class="text-subtitle">Look back at your completed workout sessions</p>
        </div>
        <div class="calendar-nav">
          <button class="btn btn-secondary btn-icon-only" id="btn-prev-month" aria-label="Previous month">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <h3 id="current-month-year">June 2026</h3>
          <button class="btn btn-secondary btn-icon-only" id="btn-next-month" aria-label="Next month">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      <div class="month-stats" id="month-stats"></div>

      <div class="history-content-layout">
        <!-- Calendar Grid -->
        <div class="calendar-container">
          <div class="calendar-weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="calendar-days" id="calendar-days">
            <!-- Calendar days dynamically rendered -->
          </div>
        </div>

        <!-- Detail summary on the side -->
        <div class="history-details-card" id="history-day-details">
          <h4 id="history-details-date">Select a day</h4>
          <div id="history-details-content">
            <p class="text-muted">Click a highlighted day in the calendar to view its completed exercises.</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Floating Timer Widget -->
    <div class="floating-timer hidden" id="timer-widget">
      <div class="timer-ring-container">
        <svg class="timer-ring" width="80" height="80">
          <circle class="timer-ring-bg" stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
          <circle class="timer-ring-progress" id="timer-progress" stroke="var(--accent-gradient-start)" stroke-width="6" stroke-dasharray="213.6" stroke-dashoffset="0" fill="transparent" r="34" cx="40" cy="40"/>
        </svg>
        <span class="timer-text" id="timer-display">2:00</span>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" id="timer-sub-10">-10s</button>
        <button class="timer-btn" id="timer-add-10">+10s</button>
        <button class="timer-btn" id="timer-pause">Pause</button>
        <button class="timer-btn btn-highlight" id="timer-skip">Skip</button>
      </div>
    </div>

    <!-- Edit/Add Exercise Modal -->
    <div class="modal-backdrop hidden" id="exercise-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-title">Edit Exercise</h3>
          <button class="close-btn" id="modal-close" aria-label="Close dialog">&times;</button>
        </div>
        <form id="exercise-form">
          <input type="hidden" id="edit-exercise-index">
          
          <div class="form-group">
            <label for="input-exercise-name">Exercise Name</label>
            <input type="text" id="input-exercise-name" required placeholder="e.g. Bench Press">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="input-exercise-sets">Sets</label>
              <input type="number" id="input-exercise-sets" min="1" max="10" required>
            </div>
            <div class="form-group">
              <label for="input-exercise-reps">Reps per Set</label>
              <input type="number" id="input-exercise-reps" min="1" max="100" required>
            </div>
          </div>

          <div class="form-group">
            <label for="input-exercise-category">Muscle Group</label>
            <select id="input-exercise-category" required>
              <option value="chest">Chest</option>
              <option value="back">Back</option>
              <option value="shoulder">Shoulder</option>
              <option value="bicep">Bicep</option>
              <option value="tricep">Tricep</option>
              <option value="legs">Legs</option>
              <option value="abs">Abs / Core</option>
              <option value="cardio">Cardio / Other</option>
            </select>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <audio id="timer-chime" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
